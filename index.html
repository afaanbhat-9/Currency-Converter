<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CURRENCY CONVERTER</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2254%22 cy=%2254%22 r=%2240%22 fill=%22%23000%22/><circle cx=%2250%22 cy=%2250%22 r=%2240%22 fill=%22%23fcd34d%22 stroke=%22%23000%22 stroke-width=%226%22/><circle cx=%2250%22 cy=%2250%22 r=%2228%22 fill=%22none%22 stroke=%22%23f59e0b%22 stroke-width=%224%22/><text x=%2250%22 y=%2268%22 font-family=%22Impact, sans-serif%22 font-size=%2250%22 font-weight=%22bold%22 text-anchor=%22middle%22 fill=%22%23000%22>¥</text><path d=%22M 25 35 Q 35 20 55 15%22 fill=%22none%22 stroke=%22%23fff%22 stroke-width=%226%22 stroke-linecap=%22round%22/></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Screen tone dots -->
  <div class="screen-tone"></div>

  <!-- Speed lines -->
  <div class="speed-lines speed-lines-h"></div>
  <div class="speed-lines speed-lines-v"></div>
  <div class="speed-line-accent sla-1"></div>
  <div class="speed-line-accent sla-2"></div>
  <div class="speed-line-accent sla-3"></div>

  <div class="container">
    <div class="converter-card" id="converterCard">

      <div class="corner-tl"></div>
      <div class="corner-tr"></div>
      <div class="corner-bl"></div>
      <div class="corner-br"></div>

      <div class="card-controls stagger-1">
        <button id="popupToggle" class="control-btn" title="Toggle Popups">💥</button>
        <button id="soundToggle" class="control-btn" title="Toggle Sound">🔊</button>
        <button id="themeToggle" class="control-btn" title="Toggle Theme">🌙</button>
      </div>

      <div class="header stagger-1">
        <span class="icon">&#x26A1;</span>
        <h1>Currency Converter</h1>
        <p>Live Rates &middot; 86 Currencies</p>
      </div>

      <div class="amount-group stagger-2">
        <label for="amount">Enter Amount</label>
        <div class="amount-wrap">
          <span class="amount-currency" id="amountCurrency">$</span>
          <input type="number" id="amount" value="1" min="0" step="any" placeholder="0.00">
        </div>
      </div>

      <div class="currency-row stagger-3">
        <div class="currency-group">
          <div class="field-label">From</div>
          <div class="custom-select" id="fromDropdown"></div>
        </div>
        <div class="swap-wrap">
          <button class="swap-btn" id="swapBtn" title="Swap currencies">
            <span class="swap-icon">&#x21C4;</span>
          </button>
        </div>
        <div class="currency-group">
          <div class="field-label">To</div>
          <div class="custom-select" id="toDropdown"></div>
        </div>
      </div>

      <div class="rate-display stagger-4" id="rateDisplay">
        <div class="rate-header">
          <span class="rate-label" id="rateLabel">Loading rates...</span>
          <span class="rate-direction" id="rateDirection"></span>
        </div>
        <div class="rate-value" id="rateValue">
          <span class="spinner"></span>
        </div>
        <div class="rate-sub" id="rateSub"></div>
      </div>

      <div class="popular-section stagger-5">
        <div class="section-label">Quick Convert</div>
        <div class="popular-grid" id="popularGrid"></div>
      </div>

      <div class="footer stagger-6">
        Powered by <span id="baseInfo">USD</span> &bull; Updates every 30m
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
